# ============================================
# LINT STAGE
# ============================================
lint:
  stage: lint
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - echo "=== Running golangci-lint ==="
    - golangci-lint run ./... --timeout=5m || true
  allow_failure: true
  only:
    - master
    - main
    - develop

lint-format:
  stage: lint
  image: golang:${GO_VERSION}
  before_script:
    - go version
  script:
    - echo "=== Checking formatting ==="
    - |
      unformatted=$(gofmt -l .)
      if [ -n "$unformatted" ]; then
        echo "Files not formatted:"
        echo "$unformatted"
        exit 1
      fi
      echo "All files properly formatted"
  only:
    - master
    - main
    - develop

# ============================================
# SECURITY STAGE
# ============================================
security-gosec:
  stage: security
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - echo "=== Running Gosec Security Scanner ==="
    - gosec -fmt json -out gosec-results.json ./... || true
  artifacts:
    reports:
      junit: gosec-results.json
    paths:
      - gosec-results.json
    when: always
  allow_failure: true
  only:
    - master
    - main
    - develop

security-trivy:
  stage: security
  image:
    name: aquasecurity/trivy:latest
    entrypoint: [""]
  before_script:
    - trivy --version || true
  script:
    - echo "=== Running Trivy Vulnerability Scan ==="
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL . 2>&1 | head -100 || true
  allow_failure: true
  only:
    - master
    - main
    - develop

# ============================================
# CROSS-COMPILE STAGE
# ============================================
cross-compile-linux:
  stage: cross-compile
  image: golang:${GO_VERSION}
  before_script:
    - go version
  script:
    - echo "=== Cross-compiling for Linux ==="
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o build/vigil-linux-amd64 ./cmd/vigil
    - GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o build/vigil-linux-arm64 ./cmd/vigil
    - ls -la build/
  artifacts:
    paths:
      - build/
    when: always
  only:
    - master
    - main
    - develop

cross-compile-darwin:
  stage: cross-compile
  image: golang:${GO_VERSION}
  before_script:
