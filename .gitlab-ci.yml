  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-alert-dissemination:latest apps/alert-dissemination/
  - docker push $REGISTRY/vimi-alert-dissemination:latest || true
  only:
  - master
build-env-monitor:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-env-monitor:latest apps/env-monitor/
  - docker push $REGISTRY/vimi-env-monitor:latest || true
  only:
  - master
build-replay-engine:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-replay-engine:latest apps/replay-engine/
  - docker push $REGISTRY/vimi-replay-engine:latest || true
  only:
  - master
build-data-catalog:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-data-catalog:latest apps/data-catalog/
  - docker push $REGISTRY/vimi-data-catalog:latest || true
  only:
  - master
build-hla-bridge:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-dis-hla-gateway:latest hla-bridge/
  - docker push $REGISTRY/vimi-dis-hla-gateway:latest || true
  only:
  - master
build-vimi-plugin:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-vimi-plugin:latest vimi-plugin/
  - docker push $REGISTRY/vimi-vimi-plugin:latest || true
  only:
  - master
test-all:
  stage: test
  image: golang:1.22
  script:
  - go version
  - for app in apps/opir-ingest apps/missile-warning-engine apps/sensor-fusion apps/lvc-coordinator
    apps/alert-dissemination apps/env-monitor apps/replay-engine apps/data-catalog
    hla-bridge vimi-plugin; do echo "Building $app..."; (cd $app && go build ./...)
    || exit 1; done
  - echo "All apps built successfully"
  only:
  - master
security-scan:
  stage: security-scan
  image:
    name: ghcr.io/aquasecurity/trivy:0.64.1
    entrypoint:
    - ''
  before_script:
  - trivy version || true
  script:
  - for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination
    env-monitor replay-engine data-catalog dis-hla-gateway vimi-plugin; do trivy image
    --exit-code 0 --severity HIGH,CRITICAL $REGISTRY/vimi-$app:latest 2>&1 | grep
    -E 'Total|CRITICAL|HIGH' || true; done
  allow_failure: true
  only:
  - master
publish:
  stage: publish
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY || true
  - for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination
    env-monitor replay-engine data-catalog dis-hla-gateway vimi-plugin; do docker
    push $REGISTRY/vimi-$app:latest || true; done
  needs:
  - build-opir-ingest
  - build-missile-warning-engine
  - build-sensor-fusion
  - build-lvc-coordinator
  - build-alert-dissemination
  - build-env-monitor
  - build-replay-engine
  - build-data-catalog
  - build-hla-bridge
  - build-vimi-plugin
  only:
  - master
deploy-k8s:
  stage: deploy-k8s
  image: docker:24-dind
  services:
  - name: docker:24-dind
  needs:
  - publish
  before_script:
  - apk add --no-cache kubectl >/dev/null 2>&1
  script:
  - set -e
  - echo "$KUBECONFIG_BASE64" | base64 -d > /tmp/kubeconfig
  - sed -i "s|https://[^:]*:6443|https://172.17.0.1:6443|g" /tmp/kubeconfig
  - kubectl --kubeconfig /tmp/kubeconfig cluster-info
  - for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination
    env-monitor replay-engine data-catalog dis-hla-gateway vimi-plugin; do echo "Loading
    $app into kind..."; docker save $REGISTRY/vimi-$app:latest | docker exec -i $(kubectl
    --kubeconfig /tmp/kubeconfig get nodes -o jsonpath='{.items[0].metadata.name}')
    ctr -n k8s.io images import - 2>/dev/null || true; done
  - kubectl --kubeconfig /tmp/kubeconfig get ns vimi 2>/dev/null || kubectl --kubeconfig
    /tmp/kubeconfig create ns vimi
  - kubectl --kubeconfig /tmp/kubeconfig apply -f k8s/vimi-cluster/apps/ --namespace
    vimi
  - for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination
    env-monitor replay-engine data-catalog dis-hla-gateway vimi-plugin; do kubectl
    --kubeconfig /tmp/kubeconfig set image deployment/$app $app=$REGISTRY/vimi-$app:latest
    -n vimi; done
  - kubectl --kubeconfig /tmp/kubeconfig rollout status deployment -n vimi --timeout=120s
    || true
  - kubectl --kubeconfig /tmp/kubeconfig get pods -n vimi
  environment:
    name: production
    url: https://vimi.stsgym.com
  when: manual
  only:
  - master
