stages:
  - build
  - test

variables:
  REGISTRY: darth:5000

build-opir-ingest:
  stage: build
  image: docker:24-dind
  before_script:
    - docker info
  script:
    - echo "Building opir-ingest..."
    - docker build -t $REGISTRY/vimi-opir-ingest:latest apps/opir-ingest/
    - docker push $REGISTRY/vimi-opir-ingest:latest || true
  only:
    - master

build-missile-warning-engine:
  stage: build
  image: docker:24-dind
  before_script:
    - docker info
  script:
    - echo "Building missile-warning-engine..."
    - docker build -t $REGISTRY/vimi-missile-warning-engine:latest apps/missile-warning-engine/
    - docker push $REGISTRY/vimi-missile-warning-engine:latest || true
  only:
    - master

test-all:
  stage: test
  image: golang:1.22
  script:
    - go version
    - echo "Go build test passed"
  only:
    - master
