    - GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o build/vigil-darwin-amd64 ./cmd/vigil
    - GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o build/vigil-darwin-arm64 ./cmd/vigil
