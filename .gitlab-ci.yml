# ============================================
# BENCHMARKS STAGE
# ============================================
benchmarks:
  stage: benchmarks
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go mod download
  script:
    - echo "=== Running Benchmarks ==="
    - go test -bench=. -benchmem -timeout=10m ./pkg/.../... 2>&1 | head -150
  allow_failure: true
  only:
    - master
    - main

# ============================================
# DEPLOY STAGE (OPTIONAL)
# ============================================
deploy-k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - kubectl version --client || true
  script:
    - echo "=== Deploying to Kubernetes ==="
    - |
      if [ -n "$KUBECONFIG_BASE64" ]; then
        echo "$KUBECONFIG_BASE64" | base64 -d > /tmp/kubeconfig
        kubectl --kubeconfig /tmp/kubeconfig get nodes
        kubectl --kubeconfig /tmp/kubeconfig create ns vigil 2>/dev/null || true
        kubectl --kubeconfig /tmp/kubeconfig apply -f k8s/vigil/ --namespace vigil 2>/dev/null || echo "k8s manifests not ready"
      else
        echo "KUBECONFIG not configured, skipping deployment"
      fi
  environment:
    name: production
    url: https://vigil.stsgym.com
  when: manual
  only:
    - master
    - main

# ============================================
# CACHE
# ============================================
go-cache:
  variables:
    GOPROXY: https://proxy.golang.org,direct
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/go-build
      - /go/pkg/mod