stages:
  - build
  - test
  - lint
  - security
  - cross-compile
  - docker
  - benchmarks

variables:
  GO_VERSION: "1.22"
  DOCKER_DRIVER: overlay2
  REGISTRY: darth:5000

# ============================================
# BUILD STAGE
# ============================================
build-root:
  stage: build
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go mod download
  script:
    - echo "=== Building root packages ==="
    - go build -v ./...
  artifacts:
    paths:
      - "*.exe"
    when: always
  only:
    - master
    - main
    - develop

build-apps:
  stage: build
  image: golang:${GO_VERSION}
  before_script:
    - go version
  script:
    - echo "=== Building applications ==="
    - |
      for app in apps/*/; do
        if [ -f "$app/main.go" ]; then
          echo "Building $app..."
          (cd "$app" && go mod tidy 2>/dev/null || go mod init temp && go mod tidy && go build -v ./...)
        fi
      done
  artifacts:
    paths:
      - apps/*/main
    when: always
  only:
    - master
    - main
    - develop

build-pkgs:
  stage: build
  image: golang:${GO_VERSION}
  before_script:
    - go version
  script:
    - echo "=== Building packages ==="
    - |
      for pkg in pkg/*/; do
        if ls "$pkg"*.go 2>/dev/null | grep -v _test.go > /dev/null; then
          echo "Building $pkg..."
          (cd "$pkg" && go mod tidy 2>/dev/null || go mod init temp && go mod tidy && go build -v ./... 2>&1) || true
        fi
      done
  artifacts:
    paths:
      - pkg/*/
    when: always
  only:
    - master
    - main
    - develop

# ============================================
# TEST STAGE
# ============================================
test-root:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go mod download
  script:
    - echo "=== Running root tests ==="
    - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
  coverage: '/total:.*?([0-9]{1,3})%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
    when: always
  only:
    - master
    - main
    - develop

