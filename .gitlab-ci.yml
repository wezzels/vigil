stages:
- build
- test
- security-scan
- publish
- deploy-k8s
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: /certs
  REGISTRY: darth:5000
build-opir-ingest:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-opir-ingest:latest apps/opir-ingest/
  - docker push $REGISTRY/vimi-opir-ingest:latest || true
  only:
  - master
build-missile-warning-engine:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-missile-warning-engine:latest apps/missile-warning-engine/
  - docker push $REGISTRY/vimi-missile-warning-engine:latest || true
  only:
  - master
build-sensor-fusion:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-sensor-fusion:latest apps/sensor-fusion/
  - docker push $REGISTRY/vimi-sensor-fusion:latest || true
  only:
  - master
build-lvc-coordinator:
  stage: build
  image: docker:24-dind
  services:
  - docker:24-dind
  before_script:
  - docker info
  script:
  - docker build -t $REGISTRY/vimi-lvc-coordinator:latest apps/lvc-coordinator/
  - docker push $REGISTRY/vimi-lvc-coordinator:latest || true
  only:
