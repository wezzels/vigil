name: VIGIL CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  REGISTRY: ghcr.io/wezzels
  IMAGE_PREFIX: vigil

jobs:
  # ============================================
  # STAGE 1: BUILD & TEST
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all packages
        run: |
          echo "=== Building root packages ==="
          go build -v ./...
          echo "=== Building apps ==="
          for app in apps/*/; do
            if [ -f "$app/main.go" ]; then
              echo "Building $app..."
              (cd "$app" && go build -v ./... || echo "No main.go in $app")
            fi
          done
          echo "=== Building pkg packages ==="
          for pkg in pkg/*/; do
            if [ -f "$pkg"*.go 2>/dev/null ]; then
              echo "Building $pkg..."
              (cd "$pkg" && go build -v ./... || echo "No buildable files in $pkg")
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/main
            pkg/*/go.mod
          retention-days: 7

  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          echo "=== Running root tests ==="
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          echo ""
          echo "=== Running pkg tests ==="
          for pkg in pkg/*/; do
            if [ -f "$pkg"*_test.go 2>/dev/null ]; then
              echo "Testing $pkg..."
              (cd "$pkg" && go mod tidy 2>/dev/null || true && go test -v -race ./... 2>&1 | tee /dev/stderr) || true
            fi
          done
          echo ""
          echo "=== Running app tests ==="
          for app in apps/*/; do
            if [ -f "$app"*_test.go 2>/dev/null ]; then
              echo "Testing $app..."
              (cd "$app" && go mod tidy 2>/dev/null || true && go test -v -race ./... 2>&1 | tee /dev/stderr) || true
            fi
          done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
          verbose: true

  # ============================================
  # STAGE 2: CODE QUALITY
  # ============================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...

      - name: Check formatting
        run: |
          echo "=== Checking gofmt ==="
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi
          echo "All files properly formatted"

      - name: Go mod tidy check
        run: |
          echo "=== Checking go.mod ==="
          go mod tidy
          git diff --exit-code go.mod go.sum || exit 1
          echo "go.mod is clean"

  # ============================================
  # STAGE 3: SECURITY
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./... -fmt json -out gosec-results.json
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail_on_severity: high

  # ============================================
  # STAGE 4: UNIT TEST PACKAGES
  # ============================================
  test-coords:
    name: Test pkg/coords
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/coords && go mod tidy && go test -v ./...

  test-fusion:
    name: Test pkg/fusion
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/fusion && go mod tidy && go test -v ./...

  test-dis:
    name: Test pkg/dis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/dis && go mod tidy && go test -v ./...

  test-hla:
    name: Test pkg/hla
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/hla && go mod tidy && go test -v ./...

  test-tadil:
    name: Test pkg/tadil
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/tadil && go mod tidy && go test -v ./...

  test-external:
    name: Test pkg/external
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd pkg/external && go mod tidy && go test -v ./...

  test-db:
    name: Test db/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          cd db && go mod tidy && go test -v ./... 2>&1 || echo "No tests in db"

  # ============================================
  # STAGE 5: CROSS-COMPILE
  # ============================================
  cross-compile:
    name: Cross-compile (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [build, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          BINARY_NAME=vigil-${GOOS}-${GOARCH}
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags "-s -w" -o build/${BINARY_NAME} ./cmd/vigil
          ls -la build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/*
          retention-days: 7

  # ============================================
  # STAGE 6: DOCKER BUILD (MASTER ONLY)
  # ============================================
  docker-build:
    name: Docker Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [build, test, lint, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        app:
          - opir-ingest
          - missile-warning-engine
          - sensor-fusion
          - lvc-coordinator
          - alert-dissemination
          - env-monitor
          - replay-engine
          - data-catalog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  docker-manifest:
    name: Create Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination env-monitor replay-engine data-catalog; do
            echo "Creating manifest for $app..."
            docker manifest create ghcr.io/${{ github.repository }}/$app:latest \
              ghcr.io/${{ github.repository }}/$app:latest-linux-amd64 \
              ghcr.io/${{ github.repository }}/$app:latest-linux-arm64 2>/dev/null || true
            docker manifest push ghcr.io/${{ github.repository }}/$app:latest 2>/dev/null || true
          done

  # ============================================
  # STAGE 7: BENCHMARKS
  # ============================================
  benchmarks:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: |
          echo "=== Benchmarks ==="
          go test -bench=. -benchmem -timeout=10m ./pkg/.../... 2>&1 | head -100

  # ============================================
  # SUMMARY
  # ============================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, test, lint, security, cross-compile]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "# VIGIL CI/CD Pipeline Summary"
          echo ""
          echo "## Build Status"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Cross-compile: ${{ needs.cross-compile.result }}"
          echo ""
          echo "## Artifacts"
          echo "- Binaries available for download"
          echo "- Docker images pushed to ghcr.io"