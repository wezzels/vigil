name: VIGIL CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  REGISTRY: ghcr.io/wezzels
  IMAGE_PREFIX: vigil

jobs:
  # ============================================
  # STAGE 1: BUILD & TEST
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all packages
        run: |
          echo "=== Building root packages ==="
          go build -v ./...
          echo "=== Building apps ==="
          for app in apps/*/; do
            if [ -f "$app/main.go" ]; then
              echo "Building $app..."
              (cd "$app" && go build -v ./... || echo "No main.go in $app")
            fi
          done
          echo "=== Building pkg packages ==="
          for pkg in pkg/*/; do
            if [ -f "$pkg"*.go 2>/dev/null ]; then
              echo "Building $pkg..."
              (cd "$pkg" && go build -v ./... || echo "No buildable files in $pkg")
            fi
          done

  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          echo "=== Running root tests ==="
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          echo ""
          echo "=== Running pkg tests ==="
          for pkg in pkg/*/; do
            if [ -f "$pkg"*_test.go 2>/dev/null ]; then
              echo "Testing $pkg..."
              (cd "$pkg" && go mod tidy 2>/dev/null || true && go test -v -race ./... 2>&1 | tee /dev/stderr) || true
            fi
          done
          echo ""
          echo "=== Running app tests ==="
          for app in apps/*/; do
            if [ -f "$app"*_test.go 2>/dev/null ]; then
              echo "Testing $app..."
              (cd "$app" && go mod tidy 2>/dev/null || true && go test -v -race ./... 2>&1 | tee /dev/stderr) || true
            fi
          done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: |
          echo "=== Checking gofmt ==="
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi
          echo "All files properly formatted"

      - name: Go mod tidy check
        run: |
          echo "=== Checking go mod tidy ==="
          go mod tidy
          git diff --exit-code go.mod go.sum || exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./... -fmt json -out gosec-results.json
        continue-on-error: true

  cross-compile:
    name: Cross-compile (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile
        run: |
          echo "=== Building for ${{ matrix.goos }}-${{ matrix.goarch }} ==="
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -o vigil-${{ matrix.goos }}-${{ matrix.goarch }} ./...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vigil-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ============================================
  # STAGE 2: DOCKER BUILD
  # ============================================
  docker-build:
    name: Docker Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [build, test, lint, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        app:
          - opir-ingest
          - missile-warning-engine
          - sensor-fusion
          - lvc-coordinator
          - alert-dissemination
          - env-monitor
          - replay-engine
          - data-catalog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Create Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          echo "=== Creating manifest for all apps ==="
          for app in opir-ingest missile-warning-engine sensor-fusion lvc-coordinator alert-dissemination env-monitor replay-engine data-catalog; do
            docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$app:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$app:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$app:${{ github.sha }}
            docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$app:latest
          done

  benchmarks:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: |
          echo "=== Running benchmarks ==="
          go test -bench=. -benchmem ./...

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint, test, cross-compile, docker-manifest]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## VIGIL CI/CD Build Summary"
          echo ""
          echo "### Build Status"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Cross-compile: ${{ needs.cross-compile.result }}"
          echo "- Docker: ${{ needs.docker-manifest.result }}"
          echo ""
          echo "## Artifacts"
          echo "- Binaries available for download"
          echo "- Docker images pushed to ghcr.io"
