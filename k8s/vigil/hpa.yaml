# Horizontal Pod Autoscaler for VIGIL components

---
# OPIR Ingest HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opir-ingest-hpa
  namespace: vigil
  labels:
    app.kubernetes.io/name: opir-ingest
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opir-ingest
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 50
        periodSeconds: 60

---
# Missile Warning HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: missile-warning-hpa
  namespace: vigil
  labels:
    app.kubernetes.io/name: missile-warning
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: missile-warning
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: vigil_alert_queue_depth
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 3
        periodSeconds: 60
      - type: Percent
        value: 100
        periodSeconds: 60

---
# Sensor Fusion HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sensor-fusion-hpa
  namespace: vigil
  labels:
    app.kubernetes.io/name: sensor-fusion
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sensor-fusion
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  - type: Pods
    pods:
      metric:
        name: vigil_track_queue_depth
      target:
        type: AverageValue
        averageValue: "500"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 50
        periodSeconds: 60

---
# Custom Metrics Service (Prometheus Adapter)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: vigil
data:
  config.yaml: |
    rules:
    - seriesQuery: 'vigil_alert_queue_depth{namespace="vigil"}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "vigil_(.*)"
        as: "$1"
      metricsQuery: 'sum(rate(<<.Series>>[2m])) by (<<.GroupBy>>)'

    - seriesQuery: 'vigil_track_queue_depth{namespace="vigil"}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "vigil_(.*)"
        as: "$1"
      metricsQuery: 'sum(rate(<<.Series>>[2m])) by (<<.GroupBy>>)'

---
# Pod Disruption Budget for Missile Warning
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: missile-warning-pdb
  namespace: vigil
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: missile-warning

---
# Pod Disruption Budget for Sensor Fusion
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sensor-fusion-pdb
  namespace: vigil
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sensor-fusion