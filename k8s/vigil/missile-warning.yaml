# Missile Warning Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: missile-warning
  namespace: vigil
  labels:
    app.kubernetes.io/name: missile-warning
    app.kubernetes.io/component: warning-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: missile-warning
  template:
    metadata:
      labels:
        app: missile-warning
    spec:
      serviceAccountName: vigil
      containers:
      - name: missile-warning
        image: vigil/missile-warning:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        - containerPort: 8443
          name: https
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - configMapRef:
            name: vigil-config
        - secretRef:
            name: vigil-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /healthz/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /healthz/startup
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: certs
          mountPath: /etc/vigil/certs
          readOnly: true
        - name: alert-templates
          mountPath: /etc/vigil/templates
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: vigil-certs
      - name: alert-templates
        configMap:
          name: alert-templates
---
apiVersion: v1
kind: Service
metadata:
  name: missile-warning
  namespace: vigil
  labels:
    app.kubernetes.io/name: missile-warning
spec:
  type: ClusterIP
  selector:
    app: missile-warning
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  - port: 8443
    targetPort: 8443
    name: https
---
# Alert Templates ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-templates
  namespace: vigil
data:
  nca-conoprep.json: |
    {
      "template": "CONOPREP",
      "format": "NCA",
      "priority": "critical"
    }
  nca-imminent.json: |
    {
      "template": "IMMINENT",
      "format": "NCA",
      "priority": "high"
    }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: missile-warning-policy
  namespace: vigil
spec:
  podSelector:
    matchLabels:
      app: missile-warning
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: sensor-fusion
    ports:
    - port: 8080
      protocol: TCP
    - port: 8443
      protocol: TCP
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - port: 9092
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - port: 5432
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - port: 6379
      protocol: TCP