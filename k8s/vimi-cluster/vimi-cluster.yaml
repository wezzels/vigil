    port: 5432
    protocol: TCP
  type: ExternalName
---
apiVersion: v1
data:
  DATA_DIR: /var/vimi/data
  DIS_EXERCISE_ID: '1'
  DIS_SITE_ID: '1'
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379
kind: ConfigMap
metadata:
  name: vimi-config
  namespace: vimi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opir-ingest
  namespace: vimi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: opir-ingest
  template:
    metadata:
      labels:
        app: vimi
        component: opir-ingest
    spec:
      containers:
      - env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: PORT
          value: '8081'
        image: vimi/opir-ingest:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        name: opir-ingest
        ports:
        - containerPort: 8081
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: vimi
  name: opir-ingest
  namespace: vimi
spec:
  ports:
  - name: http
    port: 8081
    targetPort: http
  selector:
    app: vimi
    component: opir-ingest
  type: ClusterIP
---
