---
# Prometheus Monitoring
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vimi-alerts
  namespace: vimi
  labels:
    app: vimi
    prometheus: vimi
spec:
  groups:
  - name: vimi.rules
    rules:
    - alert: VIMIHostileTrack
      expr: vimi_tracks{alert_level="HOSTILE"} > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "HOSTILE track detected"
    - alert: VIMIAlertIncoming
      expr: vimi_alerts{level="INCOMING"} > 0
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: "INCOMING alert — missile in flight"
    - alert: VIMIAlertHostile
      expr: vimi_alerts{level="HOSTILE"} > 0
      for: 5s
      labels:
        severity: critical
      annotations:
        summary: "HOSTILE — NCA approval required"
    - alert: VIMIServiceDown
      expr: up{job="vimi"} == 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "VIMI service down: {{ $labels.job }}"
