---
apiVersion: v1
kind: Namespace
metadata:
  name: vimi
  labels:
    name: vimi
    simulation-type: dod-lvc
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: vimi
spec:
  type: ExternalName
  externalName: kafka.gms.svc.cluster.local
  ports:
  - port: 9092
    protocol: TCP
    name: port-0
  - port: 9093
    protocol: TCP
    name: port-1
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: vimi
spec:
  type: ExternalName
  externalName: etcd.gms.svc.cluster.local
  ports:
  - port: 2379
    protocol: TCP
    name: port-0
  - port: 2380
    protocol: TCP
    name: port-1
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vimi
spec:
  type: ExternalName
  externalName: redis.gms.svc.cluster.local
  ports:
  - port: 6379
    protocol: TCP
    name: port-0
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vimi
spec:
  type: ExternalName
  externalName: postgres.gms.svc.cluster.local
  ports:
  - port: 5432
    protocol: TCP
    name: port-0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vimi-config
  namespace: vimi
data:
  DIS_EXERCISE_ID: '1'
  DIS_SITE_ID: '1'
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379
  DATA_DIR: /var/vimi/data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opir-ingest
  namespace: vimi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: opir-ingest
  template:
    metadata:
      labels:
        app: vimi
        component: opir-ingest
    spec:
      containers:
      - name: opir-ingest
        image: vimi/opir-ingest:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8081
        env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: PORT
          value: '8081'
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: opir-ingest
  namespace: vimi
  labels:
    app: vimi
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8081
    targetPort: http
  selector:
    app: vimi
    component: opir-ingest
