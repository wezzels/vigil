apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: vimi
    simulation-type: dod-lvc
  name: vimi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: vimi
spec:
  externalName: kafka.gms.svc.cluster.local
  ports:
  - name: port-0
    port: 9092
    protocol: TCP
  - name: port-1
    port: 9093
    protocol: TCP
  type: ExternalName
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: vimi
spec:
  externalName: etcd.gms.svc.cluster.local
  ports:
  - name: port-0
    port: 2379
    protocol: TCP
  - name: port-1
    port: 2380
    protocol: TCP
  type: ExternalName
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vimi
spec:
  externalName: redis.gms.svc.cluster.local
  ports:
  - name: port-0
    port: 6379
    protocol: TCP
  type: ExternalName
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vimi
spec:
  externalName: postgres.gms.svc.cluster.local
  ports:
