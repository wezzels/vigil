---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vimi-alerts
  namespace: vimi
  labels:
    app: vimi
    prometheus: vimi
    release: prometheus
spec:
  groups:
  - name: vimi.rules
    rules:
    - alert: VIMINoActiveTracks
      expr: absent(vimi_tracks_total) or vimi_tracks_total == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: VIMI has no active threat tracks
        description: No tracks detected in 5 minutes
    - alert: VIMIHostileTrack
      expr: vimi_tracks{alert_level="HOSTILE"} > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: HOSTILE track detected
        description: Track {{ $labels.track_id }} at alert level HOSTILE
    - alert: VIMIAlertImminent
      expr: vimi_alerts{level="IMMINENT"} > 0
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: IMMINENT alert issued
        description: Missile impact predicted <15 minutes
    - alert: VIMIAlertIncoming
      expr: vimi_alerts{level="INCOMING"} > 0
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: "INCOMING alert \u2014 missile in flight"
        description: Missile impact predicted <10 minutes
    - alert: VIMIAlertHostile
      expr: vimi_alerts{level="HOSTILE"} > 0
      for: 5s
      labels:
        severity: critical
      annotations:
        summary: "HOSTILE \u2014 NCA approval required"
        description: Immediate NCA notification required
    - alert: VIMIServiceDown
      expr: up{job="vimi"} == 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: VIMI service down
        description: '{{ $labels.job }} is not responding'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vimi-prometheus-scrape
  namespace: vimi
data:
  prometheus.yml: "global:\n  scrape_interval: 15s\n  evaluation_interval: 15s\nscrape_configs:\n\
    \  - job_name: 'vimi'\n    static_configs:\n      - targets:\n        - opir-ingest:8081\n\
    \        - missile-warning-engine:8080\n        - sensor-fusion:8082\n       \
    \ - lvc-coordinator:8083\n        - alert-dissemination:8084\n        - env-monitor:8085\n\
    \        - replay-engine:8086\n        - data-catalog:8087\n        - dis-hla-gateway:8090\n\
    \        - vimi-plugin:8091\n        labels:\n          group: 'vimi'\n"
