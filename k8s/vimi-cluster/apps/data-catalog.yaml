apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-catalog
  namespace: vimi
  labels:
    app: vimi
    component: data-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: data-catalog
  template:
    metadata:
      labels:
        app: vimi
        component: data-catalog
    spec:
      containers:
      - name: data-catalog
        image: darth:5000/vimi-data-catalog:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8087
          protocol: TCP
        env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: REDIS_ADDR
          value: redis:6379
        - name: DIS_SITE_ID
          value: '1'
        - name: DIS_APP_ID
          valueFrom:
            configMapKeyRef:
              name: vimi-config
              key: DIS_APP_ID
              optional: true
        - name: PORT
          value: '8087'
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 512Mi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: data-catalog
  namespace: vimi
  labels:
    app: vimi
    component: data-catalog
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8087
    targetPort: 8087
    protocol: TCP
  selector:
    app: vimi
    component: data-catalog
