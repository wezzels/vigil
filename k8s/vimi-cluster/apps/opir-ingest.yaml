apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vimi
    component: opir-ingest
  name: opir-ingest
  namespace: vimi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: opir-ingest
  template:
    metadata:
      labels:
        app: vimi
        component: opir-ingest
    spec:
      containers:
      - env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: REDIS_ADDR
          value: redis:6379
        - name: DIS_SITE_ID
          value: '1'
        - name: DIS_APP_ID
          valueFrom:
            configMapKeyRef:
              key: DIS_APP_ID
              name: vimi-config
              optional: true
        - name: PORT
          value: '8080'
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: darth:5000/vimi-opir-ingest:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        name: opir-ingest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 64Mi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: vimi
    component: opir-ingest
  name: opir-ingest
  namespace: vimi
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: vimi
    component: opir-ingest
  type: ClusterIP
