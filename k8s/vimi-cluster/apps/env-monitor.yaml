apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-monitor
  namespace: vimi
  labels:
    app: vimi
    component: env-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: env-monitor
  template:
    metadata:
      labels:
        app: vimi
        component: env-monitor
    spec:
      containers:
      - name: env-monitor
        image: darth:5000/vimi-env-monitor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8085
          protocol: TCP
        env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: REDIS_ADDR
          value: redis:6379
        - name: DIS_SITE_ID
          value: '1'
        - name: DIS_APP_ID
          valueFrom:
            configMapKeyRef:
              name: vimi-config
              key: DIS_APP_ID
              optional: true
        - name: PORT
          value: '8085'
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 512Mi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: env-monitor
  namespace: vimi
  labels:
    app: vimi
    component: env-monitor
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8085
    targetPort: 8085
    protocol: TCP
  selector:
    app: vimi
    component: env-monitor
