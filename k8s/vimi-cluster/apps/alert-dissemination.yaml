---
# alert-dissemination — VIMI Mission App
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-dissemination
  namespace: vimi
  labels:
    app: vimi
    component: alert-dissemination
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vimi
      component: alert-dissemination
  template:
    metadata:
      labels:
        app: vimi
        component: alert-dissemination
    spec:
      containers:
      - name: alert-dissemination
        image: vimi/alert-dissemination:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: dissemination
          protocol: TCP
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: DIS_SITE_ID
          value: "1"
        - name: DIS_APP_ID
          valueFrom:
            configMapKeyRef:
              name: vimi-config
              key: DIS_APP_ID
              optional: true
        - name: PORT
          value: "dissemination"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: alert-dissemination
  namespace: vimi
  labels:
    app: vimi
    component: alert-dissemination
spec:
  type: ClusterIP
  ports:
  - name: http
    port: dissemination
    targetPort: http
    protocol: TCP
  selector:
    app: vimi
    component: alert-dissemination
